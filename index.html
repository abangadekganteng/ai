<!-- index.html -->

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Minta Studio AI</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body>

  <div class="chat-container">

    <!-- TOPBAR -->
    <div class="topbar">
      <h1>Minta Studio</h1>
    </div>

    <!-- HERO -->
    <div class="hero">

      <h2>Halo, bot_...</h2>

      <p>
        Ada yang bisa dibantu?
      </p>

    </div>

    <!-- SUGGESTIONS -->
    <div
      class="suggestions"
      id="suggestions"
    ></div>

    <!-- CHAT -->
    <div
      class="chat-box"
      id="chatBox"
    ></div>

    <!-- INPUT -->
    <div class="input-area">

      <input
        type="text"
        id="userInput"
        placeholder="Tanyakan sesuatu..."
      />

      <button
        onclick="sendMessage()"
      >
        Kirim
      </button>

    </div>

  </div>

  <!-- DATA -->
  <script src="data/responses.js"></script>

  <!-- APP -->
  <script src="js/app.js"></script>

</body>

</html>
