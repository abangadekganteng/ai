<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blacki AI</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h1>Blacki AI</h1>

        <button onclick="quickAsk('halo')">
            Halo
        </button>

        <button onclick="quickAsk('ide video')">
            Ide Video
        </button>

        <button onclick="quickAsk('capcut')">
            Edit CapCut
        </button>

        <button onclick="quickAsk('youtube')">
            YouTube
        </button>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="topbar">

            <h2>bot_...--.-...</h2>

            <p>
                AI khusus website Blacki
            </p>

        </header>

        <!-- CHAT -->
        <section class="chat-box" id="chatBox">

            <div class="message bot">
                <div class="bubble">
                    Halo bang 😄
                </div>
            </div>

        </section>

        <!-- INPUT -->
        <div class="input-area">

            <input
                type="text"
                id="userInput"
                placeholder="Tulis pesan..."
            >

            <button onclick="sendMessage()">
                Kirim
            </button>

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>
</html></html>
