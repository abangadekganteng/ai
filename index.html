<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minta Studio AI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">

    <div class="topbar">
      <h1>Minta Studio</h1>
    </div>

    <div class="hero">
      <h2>Halo, bot_...</h2>
      <p>Ada yang bisa dibantu?</p>
    </div>

    <div class="suggestions">
      <button onclick="sendSuggestion('Ringkas komentar')">
        Ringkas komentar
      </button>

      <button onclick="sendSuggestion('Sarankan ide video baru')">
        Sarankan ide video baru
      </button>

      <button onclick="sendSuggestion('Ringkas performa channel saya')">
        Ringkas performa channel saya
      </button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Tanyakan sesuatu..."
      >

      <button onclick="sendMessage()">
        Kirim
      </button>
    </div>

  </div>

  <script src="responses.js"></script>
  <script src="script.js"></script>

</body>
</html>
